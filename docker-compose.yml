services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pdfdb
      POSTGRES_USER: pdfuser
      POSTGRES_PASSWORD: pdfpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.6-management-alpine
    environment:
        RABBITMQ_DEFAULT_USER: admin 
        RABBITMQ_DEFAULT_PASS: admin 
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: